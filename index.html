<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analog Sandbox</title>
    <style>
        :root {
            --bg-light: #ffffff;
            --text-light: #000000;
            --bg-dark: #09090b;
            --text-dark: #ffffff;
            --fire-color: #ff4500;
            --ember-color: #ffca28;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
            overflow: hidden;
            background-color: var(--bg-dark); /* The "under" layer */
        }

        /* The Bottom Layer (Dark Mode) */
        .layer-dark {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-dark);
            color: var(--text-dark);
            z-index: 1;
        }

        /* The Top Layer (Light Mode - The one that burns) */
        .layer-light {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-light);
            color: var(--text-light);
            z-index: 2;
            transition: mask-image 1.5s ease-in-out, -webkit-mask-image 1.5s ease-in-out;
            
            /* Initial state: fully visible */
            mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
            -webkit-mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
        }

        /* The Burn Effect */
        .burned {
            mask-image: radial-gradient(circle at center, transparent 100%, black 100%) !important;
            -webkit-mask-image: radial-gradient(circle at center, transparent 100%, black 100%) !important;
        }

        /* The Burning Edge (The Glow) */
        .fire-edge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
            box-shadow: 0 0 50px 20px var(--fire-color), 0 0 100px 40px var(--ember-color);
            transition: width 1.5s ease-in-out, height 1.5s ease-in-out, opacity 1.5s;
            opacity: 0;
        }

        .burning .fire-edge {
            width: 150vmax;
            height: 150vmax;
            opacity: 1;
        }

        h1 { font-size: 3rem; letter-spacing: -2px; }
        button {
            z-index: 10;
            padding: 12px 24px;
            background: transparent;
            border: 2px solid currentColor;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="layer-dark">
        <h1>ANALOG SANDBOX</h1>
        <p>Status: Into the void.</p>
        <button onclick="resetBurn()">Extinguish & Reset</button>
    </div>

    <div class="layer-light" id="topLayer">
        <h1>ANALOG SANDBOX</h1>
        <p>Status: Back to the light.</p>
        <button onclick="startBurn()">Burn the Page</button>
    </div>

    <div class="fire-edge" id="fire"></div>

    <script>
        function startBurn() {
            const topLayer = document.getElementById('topLayer');
            const fire = document.body;
            
            // Start the burning animation
            fire.classList.add('burning');
            topLayer.classList.add('burned');

            // Hide the fire after the "paper" is gone
            setTimeout(() => {
                document.getElementById('fire').style.opacity = '0';
            }, 1200);
        }

        function resetBurn() {
            const topLayer = document.getElementById('topLayer');
            const fire = document.body;
            
            // Instantly reset for another go
            fire.classList.remove('burning');
            topLayer.classList.remove('burned');
            document.getElementById('fire').style.opacity = '0';
        }
    </script>
</body>
</html>
